<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Maker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin:0;
            padding:0;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color:white;
            text-align:center;
        }
        .content {
            max-width:600px;
        }
        h1 {
            font-size:3em;
            margin-bottom:0.5em;
        }
        .team {
            display:flex;
            gap:2em;
            justify-content:center;
            margin:2em 0;
        }
        .member {
            display:flex;
            flex-direction:column;
            align-items:center;
        }
        .member img {
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            margin-bottom:0.5em;
        }
        .buttons {
            margin-top:2em;
            display:flex;
            gap:1em;
        }
        .btn {
            background:#fff;
            color:#667eea;
            padding:0.75em 1.5em;
            border-radius:4px;
            text-decoration:none;
            font-weight:600;
            transition:background .2s;
        }
        .btn:hover { background:#f0f0f0; }
    </style>
</head>
<body>
    <div class="content">
        <h1>Resume Maker</h1>
        <p>Build beautiful resumes in minutes. Save your progress, manage multiple versions, and co‑found your career.</p>
        <div class="team">
            <div class="member">
                <img src="https://via.placeholder.com/120" alt="Co-founder 1">
                <div>Alice Smith</div>
            </div>
            <div class="member">
                <img src="https://via.placeholder.com/120" alt="Co-founder 2">
                <div>Bob Jones</div>
            </div>
        </div>
        <div class="buttons">
            <a class="btn" href="login.html">Log In</a>
            <a class="btn" href="signup.html">Sign Up</a>
        </div>
    </div>
</body>
</html>
