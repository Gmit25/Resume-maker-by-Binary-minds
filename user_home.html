<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Home - Resume Maker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin:0;
            padding:0;
            min-height:100vh;
            background:#f5f5f5;
            display:flex;
            flex-direction:column;
        }
        .header {
            background:#667eea;
            color:white;
            padding:20px;
            position:relative;
        }
        .header .create {
            position:absolute;
            left:20px;
            top:20px;
            background:#fff;
            color:#667eea;
            padding:8px 12px;
            border-radius:4px;
            text-decoration:none;
            font-weight:600;
        }
        .header .profile {
            position:absolute;
            right:20px;
            top:20px;
            background:#fff;
            color:#667eea;
            padding:8px 12px;
            border-radius:4px;
            text-decoration:none;
            font-weight:600;
        }
        .main {
            flex:1;
            padding:40px;
        }
        .library {
            background:#fff;
            padding:20px;
            border-radius:8px;
            max-width:800px;
            margin:0 auto;
        }
        .resume-item {
            padding:10px 0;
            border-bottom:1px solid #eee;
            cursor:pointer;
        }
        .resume-item:last-child { border-bottom:none; }
        .empty-message { text-align:center; color:#999; }
    </style>
</head>
<body>
    <div class="header">
        <a class="create" href="resume.html">+ New Resume</a>
        <span>User Dashboard</span>
        <a class="profile" href="profile.html">Profile</a>
    </div>
    <div class="main">
        <div class="library" id="library">
            <h2>Your Resumes</h2>
            <div id="libraryList" class="empty-message">No resumes yet.</div>
        </div>
    </div>

    <script>
        async function loadLibrary() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            const res = await fetch('/api/resumes', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) return;
            const list = await res.json();
            const container = document.getElementById('libraryList');
            if (list.length === 0) {
                container.className = 'empty-message';
                container.textContent = 'No resumes yet.';
                return;
            }
            container.className = '';
            container.innerHTML = list.map(r => `
                <div class="resume-item" onclick="openResume('${r._id}')">
                    ${r.title} <span style="color:#999;font-size:.9em">(${new Date(r.createdAt).toLocaleDateString()})</span>
                </div>
            `).join('');
        }
        function openResume(id) {
            window.location.href = `resume.html?load=${id}`;
        }
        // redirect if not logged in
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        } else {
            loadLibrary();
        }
    </script>
</body>
</html>
